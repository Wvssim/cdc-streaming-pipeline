name: cdc-streaming-pipeline

services:

  cdc-postgres:
    image: postgres:17
    container_name: cdc-postgres
    hostname: cdc-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: docdb
      POSTGRES_USER: cdc
      POSTGRES_PASSWORD: cdc
    # wal_level=logical : requis par le plugin pgoutput de Debezium pour lire le WAL
    command: [ "postgres", "-c", "wal_level=logical", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10" ]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # init-scripts/ ne se rejoue qu'au 1er boot sur un volume vide (docker compose down -v pour repartir)
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cdc -d docdb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.1.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9094:9094"   # PLAINTEXT_HOST : accès depuis l'hôte (IDE, tests locaux)
    environment:
      # --- KRaft (aucun Zookeeper) : ce nœud est à la fois broker ET controller ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10

  connect:
    image: quay.io/debezium/connect:3.5
    container_name: connect
    hostname: connect
    depends_on:
      kafka:
        condition: service_healthy
      cdc-postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: cdc-connect-cluster
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  kafka-ui:
    # Kafbat UI = fork communautaire actif de l'ancien provectuslabs/kafka-ui (non maintenu)
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
      - connect
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cdc-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083

  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # console web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  # Container d'init one-shot : MinIO ne crée pas de bucket tout seul.
  # Il attend MinIO, crée le bucket 'documents', puis s'arrête (Exited 0, normal).
  createbuckets:
    image: minio/mc:latest
    container_name: createbuckets
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo 'attente de MinIO...'; sleep 2; done;
      mc mb --ignore-existing local/documents;
      echo 'bucket documents pret';
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP (les services y envoient les mails)
      - "8025:8025"   # interface web (consultation des mails)

volumes:
  postgres-data:
  minio-data:
